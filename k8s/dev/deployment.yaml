apiVersion: v1
kind: Namespace
metadata:
  name: payment-gateway-dev

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: payment-gateway-dev
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: 493919098970.dkr.ecr.us-east-2.amazonaws.com/payment-gateway:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: payment-gateway-env
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: payment-gateway-dev
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: payment-gateway-dev
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: 493919098970.dkr.ecr.us-east-2.amazonaws.com/payment-gateway:IMAGE_TAG
          imagePullPolicy: Always
          command: ["python", "-m", "gateway.worker"]
          envFrom:
            - secretRef:
                name: payment-gateway-env
          resources:
            requests:
              cpu: "125m"
              memory: 128Mi
            limits:
              cpu: "250m"
              memory: 256Mi
      terminationGracePeriodSeconds: 30
